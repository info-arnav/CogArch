# CogArch Default Configuration

# ── Model Configuration ──
coordinator:
  model_id: "llama3:8b"
  max_tokens: 1024
  temperature: 0.3

specialists:
  enabled: ["logical", "creative", "skeptical", "empathetic"]
  model_id: "llama3:8b"
  max_tokens: 2048

# ── Inference ──
inference:
  enable_revision_pass: true
  revision_max_tokens: 512
  parallel_backend: "asyncio"

# ── Ollama ──
ollama:
  base_url: "http://localhost:11434"

# ── Self-State ──
self_state:
  focus_vector_dim: 128
  routing_history_length: 20
  initial_uncertainty: 0.5

# ── Experience Log ──
experience_log:
  storage: "jsonl"
  path: "data/experience_log/"
  max_size_mb: 500

# ── Sleep Cycle ──
sleep_cycle:
  trigger: "manual"
  trigger_after_n_rounds: 50
  curation:
    max_items: 200
    vindication_weight: 3
    disagreement_weight: 2
    loss_weight: 3

# ── Competitive Training ──
competitive:
  rounds_per_session: 50
  benchmark: "arc-agi"
  sleep_after_session: true

# ── Fine-tuning (requires GPU + unsloth) ──
finetuning:
  enabled: true # set false to use in-context learning only
  base_model: "unsloth/llama-3-8b-Instruct-bnb-4bit" # instruct model required for chat templates
  lora_rank: 16
  lora_alpha: 16
  epochs: 3
  batch_size: 4
  grad_accumulation: 4
  max_seq_length: 2048
  min_examples: 10 # skip if fewer curated examples than this
  output_dir: "models" # GGUF + adapter weights saved here
  registry_path: "models/registry.json" # versioned model tracking + rollback
  regression_threshold: 0.05 # roll back if score drops more than this
