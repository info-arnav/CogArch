# CogArch — Code Competition Configuration

# ── Model ──
model:
  ollama_id: "deepseek-coder:33b"
  hf_id: "unsloth/deepseek-coder-33b-instruct-bnb-4bit"
  max_tokens: 1024
  temperature: 0.5

# ── Ollama ──
ollama:
  base_url: "http://localhost:11434"

# ── Specialists ──
specialists:
  enabled: ["logical", "creative", "skeptical", "empathetic"]
  max_attempts_per_problem: 10   # iterative refinement with error feedback
  execution_timeout_seconds: 10  # per attempt

# ── Competition ──
competition:
  rounds_per_cycle: 30
  train_benchmark: "mbpp"
  eval_benchmark: "humaneval"

# ── Fine-tuning (requires A100 + unsloth) ──
finetuning:
  enabled: true
  base_model: "unsloth/deepseek-coder-33b-instruct-bnb-4bit"
  lora_rank: 16
  lora_alpha: 16
  epochs: 3
  batch_size: 2
  grad_accumulation: 8        # effective batch = 16
  max_seq_length: 2048
  min_examples: 20
  output_dir: "models"
  registry_path: "models/registry.json"
  regression_threshold: 0.05

# ── Memory ──
memory:
  dir: "data/memory"
  working_capacity: 10        # max items held in session (7±2 rule)
  max_episodic: 2000          # prune beyond this during sleep
  embed_model: "nomic-embed-text"   # via Ollama — pull once: ollama pull nomic-embed-text

# ── Experiment ──
experiment:
  cycles: 10
  output_dir: "data/experiments/code"
