name: Bug Report
description: Report a bug or issue
title: "[Bug]: "
labels: ["bug"]

body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Run 'cogarch infer "..."'
        2. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior (include full traceback)
      render: shell
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: CogArch Version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python Version
      placeholder: "3.11"
    validations:
      required: true

  - type: dropdown
    id: backend
    attributes:
      label: LLM Backend
      options:
        - OpenAI
        - Anthropic
        - Ollama
        - vLLM
        - Other
    validations:
      required: true
